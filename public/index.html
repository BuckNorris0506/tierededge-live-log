<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TieredEdge Decision Console</title>
  <meta name="description" content="TieredEdge disciplined decision console." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="top">
    <div class="shell top-inner">
      <div>
        <p class="kicker">DECISION ENGINE</p>
        <h1>TieredEdge Decision Console</h1>
        <p class="subhead">Disciplined daily decisions with integrity gating.</p>
      </div>
      <div class="meta" id="meta"></div>
    </div>
  </header>

  <main class="shell">
    <section class="panel featured" id="today-decision-section">
      <h2>Today&apos;s Decision</h2>
      <ul id="today-decision-list"></ul>
      <div class="table-wrap">
        <table id="today-bets-table"></table>
      </div>
      <div class="table-wrap">
        <table id="today-sits-table"></table>
      </div>
    </section>

    <section class="panel" id="system-health-section">
      <h2>System Health</h2>
      <ul id="system-health-list"></ul>
    </section>

    <section class="panel" id="execution-section">
      <h2>Execution</h2>
      <ul id="execution-console-list"></ul>
    </section>

    <section class="panel" id="accountability-section">
      <h2>Accountability</h2>
      <div class="range-controls">
        <button type="button" class="range-btn" data-range="today">Today</button>
        <button type="button" class="range-btn" data-range="last_7">Last 7</button>
        <button type="button" class="range-btn" data-range="all_time">All-time</button>
      </div>
      <ul id="accountability-list"></ul>
    </section>
  </main>

  <footer class="shell foot">
    <p>Methodology: decisions are blocked when integrity checks fail.</p>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
